<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// ✅ не называем URL (чтобы не ломать браузерный URL)
const SUPABASE_URL = "https://osowzswtuwhwfmhmbhqk.supabase.co"
const SUPABASE_KEY = "sb_publishable_Hu2E-PEjBS9FpPu152iI1w_yu4StNh-"

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

let MY_ID = null


// 🔐 AUTH
async function checkAuth() {

  try {

    const url = new URL(window.location.href)
    const hasCode = url.searchParams.get('code')

    // 🔥 обработка OAuth callback
    if (hasCode) {
      await supabase.auth.exchangeCodeForSession(window.location.href)
      window.history.replaceState({}, document.title, "/cloud/")
    }

  } catch (e) {
    console.warn("OAuth callback skip:", e)
  }

  const { data: { session } } = await supabase.auth.getSession()

  if (!session) {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: 'https://gleb184.github.io/cloud'
      }
    })
    return
  }

  MY_ID = session.user.id

  fetchGroup()
}


// 📥 загрузка группы
async function fetchGroup(){

  const { data, error } = await supabase
    .from('profiles')
    .select('*')

  if(error) {
    console.error("DB error:", error)
    return
  }

  const list = document.getElementById('groupList')

  list.innerHTML = data.map(user => `
  
    <div class="user-item">

      <div class="status-dot" style="background:${user.color || '#ccc'}"></div>

      <div style="flex-grow:1">
        <b>${user.username || user.email || 'No name'}</b><br>
        <small style="color:#666">
          ${user.status || 'Статус не задан'}
        </small>
      </div>

    </div>
  
  `).join('')


  const me = data.find(u => u.id === MY_ID)

  if(me){
    document.getElementById('myInfo').innerText =
      "Вы зашли как: " + (me.username || me.email)
  }
}


// 🚀 запуск
checkAuth()

setInterval(() => {
  if (MY_ID) fetchGroup()
}, 5000)

</script>
