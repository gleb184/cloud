<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Монитор статусов</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}
.container{ width:340px; }
.card{
    background:white;
    border-radius:10px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 1px 4px rgba(0,0,0,0.08);
}
h3{ margin:0 0 10px 0; font-size:16px; }
.subtitle{ font-size:13px; color:#555; margin-bottom:12px; }
.buttons{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
button{ border:none; border-radius:4px; padding:8px; font-size:13px; cursor:pointer; }
.green{ background:#2eaf4a; color:white; }
.orange{ background:#f0ad00; color:black; }
.blue{ background:#17a2b8; color:white; }
.gray{ background:#777; color:white; }
.logout{ background:#e74c3c; color:white; width:100%; margin-top:10px; }
.user-item{ display:flex; align-items:center; gap:8px; margin-top:6px; }
.status-dot{ width:8px; height:8px; border-radius:50%; }
.online-dot{ width:8px; height:8px; border-radius:50%; background:#2eaf4a; display:inline-block; margin-right:4px; }
.study-time{ font-size:22px; font-weight:bold; color:#2eaf4a; text-align:center; margin:8px 0 4px; }
.study-label{ font-size:12px; color:#888; text-align:center; }
.online-item{ display:flex; align-items:center; gap:6px; padding:4px 0; font-size:13px; }

/* Достижения */
.badge{
    display:inline-flex;
    align-items:center;
    gap:4px;
    background:#f0f0f0;
    border-radius:20px;
    padding:4px 10px;
    font-size:12px;
    margin:3px 2px;
    cursor:pointer;
    position:relative;
}
.badge.earned{ background:#fff3cd; border:1px solid #ffc107; }
.badge-locked{ opacity:0.4; }
.badges-wrap{ display:flex; flex-wrap:wrap; margin-top:6px; }

/* Рейтинг */
.rank-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 0;
    border-bottom:1px solid #f0f0f0;
    font-size:13px;
}
.rank-item:last-child{ border-bottom:none; }
.rank-num{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-weight:bold;
    flex-shrink:0;
}
.rank-num.gold{ background:#ffd700; }
.rank-num.silver{ background:#c0c0c0; }
.rank-num.bronze{ background:#cd7f32; color:white; }
.rank-score{ margin-left:auto; color:#888; font-size:12px; }

/* Тост уведомление */
.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:white;
    padding:10px 20px;
    border-radius:20px;
    font-size:13px;
    opacity:0;
    transition:opacity 0.3s;
    z-index:999;
    white-space:nowrap;
}
.toast.show{ opacity:1; }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="container">

  <div class="card">
    <h3>Мой профиль</h3>
    <div class="subtitle" id="myInfo">Загрузка...</div>
    <div class="buttons">
      <button class="green" onclick="changeStatus('Учусь','#2eaf4a')">🎓 Учусь</button>
      <button class="orange" onclick="changeStatus('Кофе','#f0ad00')">☕ Кофе</button>
      <button class="blue" onclick="changeStatus('В игре','#17a2b8')">🎮 В игре</button>
      <button class="gray" onclick="changeStatus('Дома','#777')">🏠 Дома</button>
    </div>
    <button class="logout" onclick="logout()">Выйти</button>
  </div>

  <div class="card">
    <h3>🏅 Мои достижения</h3>
    <div class="badges-wrap" id="myBadges"></div>
  </div>

  <div class="card">
    <h3>🎓 Моё время учёбы</h3>
    <div class="study-time" id="studyTime">0ч 0м 0с</div>
    <div class="study-label" id="studyLabel">текущая сессия</div>
    <div style="margin-top:8px;text-align:center;font-size:12px;color:#aaa" id="totalStudy"></div>
  </div>

  <div class="card">
    <h3>🏆 Топ студентов</h3>
    <div id="rankList"></div>
  </div>

  <div class="card">
    <h3>🟢 Сейчас онлайн</h3>
    <div id="onlineList"><small style="color:#aaa">Загрузка...</small></div>
  </div>

  <div class="card">
    <h3>Монитор группы</h3>
    <div id="groupList"></div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://osowzswtuwhwfmhmbhqk.supabase.co"
const SUPABASE_KEY = "sb_publishable_Hu2E-PEjBS9FpPu152iI1w_yu4StNh-"
const SITE_URL = "https://gleb184.github.io/cloud/"
const ONLINE_THRESHOLD = 2 * 60 * 1000

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
let MY_ID = null
let studyInterval = null
let studySeconds = 0
let sessionStudySeconds = 0  // секунды именно этой сессии (для марафонца)
let isStudying = false
let myProfile = null

// ─── Все достижения ────────────────────────────────────────
const ALL_ACHIEVEMENTS = [
  { id: 'early_bird',  emoji: '🌅', name: 'Ранняя пташка',  desc: 'Зайти на сайт до 8:00' },
  { id: 'marathon',    emoji: '🏃', name: 'Марафонец',       desc: 'Учиться более 2 часов за одну сессию' },
  { id: 'persistent', emoji: '💪', name: 'Упорный',          desc: 'Суммарно 10 часов учёбы' },
  { id: 'legend',     emoji: '👑', name: 'Легенда',          desc: 'Суммарно 50 часов учёбы' },
  { id: 'first_step', emoji: '👣', name: 'Первый шаг',       desc: 'Первый раз поставить статус «Учусь»' },
  { id: 'regular',    emoji: '📅', name: 'Постоянный',       desc: 'Зайти на сайт 5 дней подряд' },
]

// ─── Показать тост ─────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast')
  t.innerText = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 3000)
}

// ─── Выдать достижение ─────────────────────────────────────
async function grantAchievement(id) {
  if (!myProfile) return
  const current = myProfile.achievements || []
  if (current.includes(id)) return  // уже есть

  const updated = [...current, id]
  myProfile.achievements = updated

  await supabase
    .from('profiles')
    .update({ achievements: updated })
    .eq('id', MY_ID)

  const ach = ALL_ACHIEVEMENTS.find(a => a.id === id)
  if (ach) showToast(`🏅 Новое достижение: ${ach.emoji} ${ach.name}!`)
  renderMyBadges(updated)
}

// ─── Проверка достижений ───────────────────────────────────
async function checkAchievements() {
  if (!myProfile) return

  const earned = myProfile.achievements || []
  const total = myProfile.total_study_seconds || 0

  // Ранняя пташка
  const hour = new Date().getHours()
  if (hour < 8 && !earned.includes('early_bird')) {
    await grantAchievement('early_bird')
  }

  // Первый шаг
  if (isStudying && !earned.includes('first_step')) {
    await grantAchievement('first_step')
  }

  // Марафонец — 2 часа за одну сессию
  if (sessionStudySeconds >= 7200 && !earned.includes('marathon')) {
    await grantAchievement('marathon')
  }

  // Упорный — 10 часов суммарно
  if (total >= 36000 && !earned.includes('persistent')) {
    await grantAchievement('persistent')
  }

  // Легенда — 50 часов суммарно
  if (total >= 180000 && !earned.includes('legend')) {
    await grantAchievement('legend')
  }
}

// ─── Отрисовка значков ─────────────────────────────────────
function renderMyBadges(earned) {
  const wrap = document.getElementById('myBadges')
  wrap.innerHTML = ALL_ACHIEVEMENTS.map(a => {
    const has = earned.includes(a.id)
    return `
      <div class="badge ${has ? 'earned' : 'badge-locked'}" title="${a.desc}">
        ${a.emoji} ${a.name}
      </div>
    `
  }).join('')
}

// ─── Авторизация ───────────────────────────────────────────
async function checkAuth() {
  if (window.location.hash.includes('access_token')) {
    await supabase.auth.getSession()
    history.replaceState(null, '', window.location.pathname)
  }

  const params = new URLSearchParams(window.location.search)
  if (params.get('error')) {
    document.getElementById('myInfo').innerText =
      "Ошибка входа: " + decodeURIComponent(params.get('error_description') || '')
    history.replaceState(null, '', window.location.pathname)
    return
  }

  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    MY_ID = session.user.id
    await pingOnline()
    await fetchGroup()
    await checkAchievements()
    return
  }

  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: SITE_URL }
  })
}

// ─── Пинг онлайна ──────────────────────────────────────────
async function pingOnline() {
  if (!MY_ID) return
  await supabase
    .from('profiles')
    .update({ last_seen: new Date().toISOString() })
    .eq('id', MY_ID)
}

// ─── Смена статуса ─────────────────────────────────────────
window.changeStatus = async (text, color) => {
  if (!MY_ID) return

  if (isStudying) {
    await saveStudySeconds()
    stopStudyTimer()
  }

  const { error } = await supabase
    .from('profiles')
    .update({ status: text, color: color })
    .eq('id', MY_ID)

  if (error) {
    alert("Ошибка! Проверь RLS политики.")
    console.error(error)
    return
  }

  if (text === 'Учусь') {
    sessionStudySeconds = 0
    startStudyTimer()
    await checkAchievements() // first_step
  }

  fetchGroup()
}

// ─── Таймер учёбы ──────────────────────────────────────────
function startStudyTimer() {
  isStudying = true
  studyInterval = setInterval(async () => {
    studySeconds++
    sessionStudySeconds++
    renderStudyTime(studySeconds)

    // Каждые 30 секунд сохраняем
    if (studySeconds % 30 === 0) {
      await saveStudySeconds()
      await checkAchievements()
    }
  }, 1000)
}

function stopStudyTimer() {
  isStudying = false
  clearInterval(studyInterval)
  studyInterval = null
}

async function saveStudySeconds() {
  if (!MY_ID) return
  const total = (myProfile?.total_study_seconds || 0) + sessionStudySeconds
  if (myProfile) myProfile.total_study_seconds = total

  await supabase
    .from('profiles')
    .update({
      study_seconds: studySeconds,
      total_study_seconds: total
    })
    .eq('id', MY_ID)

  document.getElementById('totalStudy').innerText =
    'Всего: ' + formatTime(total)
}

function renderStudyTime(seconds) {
  document.getElementById('studyTime').innerText = formatTime(seconds)
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600)
  const m = Math.floor((seconds % 3600) / 60)
  const s = seconds % 60
  return `${h}ч ${m}м ${s}с`
}

// ─── Загрузка группы и рейтинга ────────────────────────────
async function fetchGroup() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .order('username', { ascending: true })
  if (error) return console.error(error)

  const now = Date.now()
  myProfile = data.find(u => u.id === MY_ID) || myProfile

  // Онлайн
  const onlineUsers = data.filter(u =>
    u.last_seen && (now - new Date(u.last_seen).getTime()) < ONLINE_THRESHOLD
  )
  document.getElementById('onlineList').innerHTML = onlineUsers.length
    ? onlineUsers.map(u => `
        <div class="online-item">
          <span class="online-dot"></span>
          <span>${u.username || u.email}</span>
        </div>
      `).join('')
    : '<small style="color:#aaa">Никого нет онлайн</small>'

  // Рейтинг — сортируем по total_study_seconds
  const ranked = [...data].sort((a, b) =>
    (b.total_study_seconds || 0) - (a.total_study_seconds || 0)
  ).slice(0, 10)

  const medalClass = ['gold', 'silver', 'bronze']
  document.getElementById('rankList').innerHTML = ranked.map((u, i) => {
    const achCount = (u.achievements || []).length
    const totalSec = u.total_study_seconds || 0
    return `
      <div class="rank-item">
        <div class="rank-num ${medalClass[i] || ''}">${i + 1}</div>
        <div>
          <b>${u.username || u.email}</b><br>
          <small style="color:#aaa">${achCount} достижений</small>
        </div>
        <div class="rank-score">${formatTime(totalSec)}</div>
      </div>
    `
  }).join('')

  // Группа
  document.getElementById('groupList').innerHTML = data.map(u => `
    <div class="user-item">
      <div class="status-dot" style="background:${u.color || '#ccc'}"></div>
      <div style="flex-grow:1">
        <b>${u.username || u.email}</b>
        ${(u.achievements || []).slice(0, 3).map(id => {
          const a = ALL_ACHIEVEMENTS.find(x => x.id === id)
          return a ? `<span title="${a.name}">${a.emoji}</span>` : ''
        }).join('')}<br>
        <small style="color:#666">${u.status || 'Статус не задан'}</small>
      </div>
    </div>
  `).join('')

  // Мой профиль
  const me = data.find(u => u.id === MY_ID)
  if (me) {
    document.getElementById('myInfo').innerText =
      "Вы зашли как: " + (me.username || me.email)

    renderMyBadges(me.achievements || [])

    document.getElementById('totalStudy').innerText =
      'Всего: ' + formatTime(me.total_study_seconds || 0)

    if (!isStudying) {
      studySeconds = me.study_seconds || 0
      renderStudyTime(studySeconds)
    }

    if (me.status === 'Учусь' && !isStudying) {
      startStudyTimer()
    }
  }
}

window.logout = async () => {
  if (isStudying) {
    await saveStudySeconds()
    stopStudyTimer()
  }
  await supabase.auth.signOut()
  location.reload()
}

supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session && !MY_ID) {
    MY_ID = session.user.id
    history.replaceState(null, '', window.location.pathname)
    pingOnline()
    fetchGroup()
  }
  if (event === 'SIGNED_OUT') {
    MY_ID = null
    stopStudyTimer()
    document.getElementById('myInfo').innerText = 'Загрузка...'
    document.getElementById('groupList').innerHTML = ''
    document.getElementById('onlineList').innerHTML = ''
  }
})

checkAuth()
setInterval(() => { fetchGroup(); pingOnline() }, 30000)
</script>
</body>
</html>
