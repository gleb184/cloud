```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Монитор статусов</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container{
    width:340px;
}

.card{
    background:white;
    border-radius:10px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 1px 4px rgba(0,0,0,0.08);
}

h3{
    margin:0 0 10px 0;
    font-size:16px;
}

.subtitle{
    font-size:13px;
    color:#555;
    margin-bottom:12px;
}

.buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

button{
    border:none;
    border-radius:4px;
    padding:8px;
    font-size:13px;
    cursor:pointer;
}

.green{ background:#2eaf4a; color:white; }
.orange{ background:#f0ad00; color:black; }
.blue{ background:#17a2b8; color:white; }
.gray{ background:#777; color:white; }

.user-item{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:6px;
}

.status-dot{
    width:8px;
    height:8px;
    border-radius:50%;
}

</style>
</head>


<body>

<div class="container">

<div class="card">

<h3>Мой профиль</h3>

<div class="subtitle" id="myInfo">
Вы зашли как: ...
</div>

<div class="buttons">

<button class="green" onclick="changeStatus('Учусь','#2eaf4a')">
🎓 Учусь
</button>

<button class="orange" onclick="changeStatus('Кофе','#f0ad00')">
☕ Кофе
</button>

<button class="blue" onclick="changeStatus('В игре','#17a2b8')">
🎮 В игре
</button>

<button class="gray" onclick="changeStatus('Дома','#777')">
🏠 Дома
</button>

</div>

</div>


<div class="card">

<h3>Монитор группы</h3>

<div id="groupList"></div>

</div>

</div>



<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'



const URL = "osowzswtuwhwfmhmbhqk"
const KEY = "2a2dfab0-9e73-4807-aea6-6e513503ac48"

const supabase = createClient(URL, KEY)


// ID пользователя
const MY_ID = "YOUR_USER_ID"



// смена статуса
window.changeStatus = async (text, color) => {

  const { error } = await supabase
    .from('profiles')
    .update({ status: text, color: color })
    .eq('id', MY_ID)

  if (error) {
    alert("Ошибка! Проверь RLS политики.")
    console.error(error)
  }
  else{
    fetchGroup()
  }

}



// загрузка группы
async function fetchGroup(){

  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .order('username', { ascending: true })

  if(error) return console.error(error)

  const list = document.getElementById('groupList')

  list.innerHTML = data.map(user => `
  
  <div class="user-item">

    <div class="status-dot" style="background:${user.color || '#ccc'}"></div>

    <div style="flex-grow:1">
      <b>${user.username}</b><br>
      <small style="color:#666">
        ${user.status || 'Статус не задан'}
      </small>
    </div>

  </div>
  
  `).join('')


  const me = data.find(u => u.id === MY_ID)

  if(me){
    document.getElementById('myInfo').innerText =
      "Вы зашли как: " + me.username
  }

}


fetchGroup()

setInterval(fetchGroup, 5000)

</script>

</body>
</html>
